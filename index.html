<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plotters">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Comparador de Plotters — FuturePrint</title>
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel2:#1C232D; --line:#2A323D;
    --ink:#E8EDF2; --dim:#8B97A6; --blue:#3B82F6; --gold:#F5B40C;
    --good:#22C55E; --mid:#EAB308; --bad:#EF4444;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:16px;line-height:1.4}
  .screen{display:none;min-height:100vh}
  .screen.on{display:block}

  /* ---------- HEADER ---------- */
  header{position:sticky;top:0;z-index:30;background:#0E1116f5;
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px}
  .htitle{font-size:18px;font-weight:800;letter-spacing:-.2px}
  .hsub{color:var(--dim);font-size:12px;margin-top:2px}
  .assump{display:flex;gap:10px;margin-top:12px}
  .assump label{flex:1;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:8px 12px;font-size:11px;color:var(--dim)}
  .assump input{width:100%;background:transparent;border:none;color:var(--gold);
    font-size:18px;font-weight:800;outline:none;margin-top:2px}

  /* ---------- LISTA ---------- */
  .wrap{padding:16px}
  .addbtn{width:100%;background:var(--gold);color:#1a1407;border:none;
    border-radius:14px;padding:18px;font-size:17px;font-weight:800;margin-bottom:16px}
  .listitem{display:flex;align-items:center;gap:14px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
  .listitem.top{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .rankbig{min-width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:20px;background:#2A323D;color:var(--dim)}
  .rankbig.r1{background:var(--gold);color:#1a1407}
  .rankbig.r2{background:#9CA3AF;color:#11151b}
  .rankbig.r3{background:#B45309;color:#fff}
  .liname{flex:1;min-width:0}
  .liname .n{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .liname .sub{font-size:12px;color:var(--dim);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .liscore{text-align:center;min-width:56px}
  .liscore .s{font-size:26px;font-weight:800;line-height:1}
  .liscore .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .chev{color:var(--dim);font-size:22px;margin-left:2px}
  .emptylist{text-align:center;color:var(--dim);padding:50px 20px;font-size:15px;line-height:1.6}
  .listfoot{display:flex;gap:10px;margin-top:8px}
  .listfoot button{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:600;border:none}
  .b-ref{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .b-rot{background:var(--panel2);color:var(--gold);border:1px solid var(--line)}
  .b-reset{background:#2a1518;color:#fca5a5;border:1px solid #4a2226}

  /* ---------- FICHA ---------- */
  .fichahead{position:sticky;top:0;z-index:30;background:#0E1116f5;backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;
    display:flex;align-items:center;gap:10px}
  .back{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:10px 16px;font-size:15px;font-weight:700;flex-shrink:0}
  .fh-title{flex:1;font-size:15px;font-weight:700;color:var(--dim);text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fh-nav{display:flex;gap:6px}
  .fh-nav button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;width:44px;height:42px;font-size:20px;font-weight:700}
  .fh-nav button:disabled{opacity:.3}

  .ficha{padding:16px;padding-bottom:40px}
  /* nome grande da empresa */
  .bignamebox{background:var(--panel);border:2px solid var(--gold);border-radius:16px;
    padding:14px 16px;margin-bottom:8px}
  .bignamebox .lbl{font-size:11px;color:var(--gold);text-transform:uppercase;
    letter-spacing:1px;font-weight:700;margin-bottom:4px}
  .bignamebox input{width:100%;background:transparent;border:none;color:var(--ink);
    font-size:24px;font-weight:800;outline:none}
  .bignamebox input::placeholder{color:#4a5563}

  /* métricas ao vivo */
  .live{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0 20px}
  .livecard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:12px 8px;text-align:center}
  .livecard .v{font-size:19px;font-weight:800;line-height:1.1}
  .livecard .l{font-size:9px;color:var(--dim);text-transform:uppercase;
    letter-spacing:.4px;margin-top:4px}
  .scorebanner{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px;text-align:center;margin-bottom:20px}
  .scorebanner .big{font-size:40px;font-weight:800;line-height:1}
  .scorebanner .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  /* campos espaçados */
  .sec{font-size:12px;font-weight:800;color:var(--gold);text-transform:uppercase;
    letter-spacing:.8px;margin:22px 4px 10px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:14px;color:var(--ink);font-weight:600;margin-bottom:7px}
  .field .hint{font-size:11px;color:var(--dim);font-weight:400}
  .field input,.field select{width:100%;background:var(--panel2);border:1.5px solid var(--line);
    border-radius:12px;color:var(--ink);padding:15px;font-size:17px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus{border-color:var(--blue)}
  .field input::placeholder{color:#4a5563}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;background:var(--panel2);border:1.5px solid var(--line);color:var(--dim);
    border-radius:12px;padding:15px;font-size:16px;font-weight:700}
  .seg button.sel{background:var(--gold);color:#1a1407;border-color:var(--gold)}
  .seg button.selno{background:#3a2224;color:#fca5a5;border-color:#5a2c30}
  .field textarea{width:100%;background:var(--panel2);border:1.5px solid var(--line);
    border-radius:12px;color:var(--ink);padding:14px;font-size:15px;outline:none;
    font-family:inherit;resize:vertical;min-height:70px}
  .delrow{margin-top:24px}
  .delrow button{width:100%;background:#2a1518;color:#fca5a5;border:1px solid #4a2226;
    border-radius:12px;padding:15px;font-size:14px;font-weight:600}

  /* dialog / roteiro reusa estilos simples */
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:16px;padding:0;max-width:94vw;width:460px}
  dialog::backdrop{background:#000b}
  .dlghead{padding:15px 16px;border-bottom:1px solid var(--line);font-weight:700;
    display:flex;justify-content:space-between;align-items:center}
  .dlgbody{padding:6px 0;max-height:72vh;overflow:auto}
  .xbtn{background:none;border:none;color:var(--dim);font-size:22px}
  .refrow{padding:11px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .refrow b{color:var(--gold)}
  .refrow.dead b{color:var(--bad);text-decoration:line-through}
  .refrow .meta{color:var(--dim);font-size:11px;margin-top:2px}
  /* roteiro */
  .rgroup{margin:0 0 16px}
  .rgtitle{font-size:12px;font-weight:800;color:var(--gold);text-transform:uppercase;
    letter-spacing:.5px;margin:0 4px 8px;display:flex;gap:8px}
  .rgtitle .cnt{color:var(--dim);font-weight:600}
  .ritem{display:flex;gap:11px;align-items:flex-start;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px;margin:0 0 8px}
  .ritem.done{opacity:.5}.ritem.done .rname{text-decoration:line-through}
  .rcheck{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:#1a1407}
  .ritem.done .rcheck{background:var(--good);border-color:var(--good)}
  .rtop{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
  .rstand{font-family:monospace;font-size:12px;font-weight:700;color:#1a1407;
    background:var(--gold);padding:1px 7px;border-radius:5px}
  .rstand.tbd{background:var(--panel2);color:var(--dim)}
  .rname{font-size:15px;font-weight:700}
  .rwhy{font-size:12px;color:var(--dim);margin-top:3px}
  .rprio{font-size:10px;font-weight:800;text-transform:uppercase;padding:1px 6px;
    border-radius:5px;background:#3a1518;color:#fca5a5}
</style>
</head>
<body>

<!-- ============ TELA 1: LISTA ============ -->
<div class="screen on" id="s-list">
  <header>
    <div class="htitle">Comparador de Plotters</div>
    <div class="hsub">FuturePrint • toque numa máquina para editar a ficha</div>
    <div class="assump">
      <label>Margem R$/m²<input id="margem" type="number" inputmode="decimal" value="18"></label>
      <label>Volume m²/mês<input id="volume" type="number" inputmode="decimal" value="400"></label>
    </div>
  </header>
  <div class="wrap">
    <button class="addbtn" onclick="addMachine()">+ Nova máquina</button>
    <div id="list"></div>
    <div id="emptylist" class="emptylist">Nenhuma máquina ainda.<br>Toque em <b>+ Nova máquina</b> a cada estande que visitar.</div>
    <div class="listfoot">
      <button class="b-rot" onclick="openRoteiro()">Roteiro</button>
      <button class="b-ref" onclick="openRef()">Benchmarks</button>
      <button class="b-reset" onclick="resetAll()">Zerar</button>
    </div>
  </div>
</div>

<!-- ============ TELA 2: FICHA ============ -->
<div class="screen" id="s-ficha">
  <div class="fichahead">
    <button class="back" onclick="goList()">‹ Lista</button>
    <div class="fh-title" id="fh-title">Máquina</div>
    <div class="fh-nav">
      <button id="nav-prev" onclick="navMachine(-1)">‹</button>
      <button id="nav-next" onclick="navMachine(1)">›</button>
    </div>
  </div>
  <div class="ficha" id="ficha"></div>
</div>

<dialog id="refdlg">
  <div class="dlghead"><span>Benchmarks levantados</span><button class="xbtn" onclick="refdlg.close()">✕</button></div>
  <div class="dlgbody" id="refbody"></div>
</dialog>
<dialog id="rotdlg">
  <div class="dlghead"><span>Roteiro da feira</span><button class="xbtn" onclick="rotdlg.close()">✕</button></div>
  <div class="dlgbody" id="rotbody"></div>
</dialog>

<script>
/* ---------------- estado ---------------- */
let data=load();
let current=-1;
const margem=document.getElementById('margem'), volume=document.getElementById('volume');
(function(){try{const a=JSON.parse(localStorage.getItem('assump'));if(a){margem.value=a.m;volume.value=a.v}}catch(e){}})();
function load(){try{return JSON.parse(localStorage.getItem('plotters2')||'[]')}catch(e){return[]}}
function save(){localStorage.setItem('plotters2',JSON.stringify(data));
  localStorage.setItem('assump',JSON.stringify({m:margem.value,v:volume.value}))}
margem.oninput=()=>{save();renderList()};volume.oninput=()=>{save();renderList()};

/* ---------------- cálculo ---------------- */
function num(x){const n=parseFloat(x);return isNaN(n)?0:n}
function calc(d){
  const M=num(margem.value),V=num(volume.value);
  const ct=num(d.rend)>0?num(d.tinta)/num(d.rend):0;
  const ml=ct>0?M-ct:null;
  const lucro=ml!==null?ml*V:null;
  const pb=(lucro&&lucro>0&&num(d.preco)>0)?num(d.preco)/lucro:null;
  return {ct,ml,lucro,pb};
}
function computeScores(){
  const arr=data.map(d=>({d,c:calc(d)}));
  const precos=arr.map(x=>num(x.d.preco)).filter(v=>v>0);
  const custos=arr.map(x=>x.c.ct).filter(v=>v>0);
  const pbs=arr.map(x=>x.c.pb).filter(v=>v);
  const inv=(v,list)=>{if(v<=0||list.length<2)return 50;const mn=Math.min(...list),mx=Math.max(...list);
    return mx===mn?100:100*(mx-v)/(mx-mn)};
  arr.forEach(x=>{
    if(num(x.d.preco)<=0){x.score=null;return}
    const sP=inv(num(x.d.preco),precos);
    const sC=x.c.ct>0?inv(x.c.ct,custos):50;
    const sB=x.c.pb?inv(x.c.pb,pbs):50;
    const conf=((num(x.d.suporte)/5)*0.6+((x.d.iepson||'')==='SIM'?0.4:0))*100;
    x.score=Math.round(0.40*sP+0.25*sC+0.20*sB+0.15*conf);
  });
  const ranked=[...arr].filter(x=>x.score!==null).sort((a,b)=>b.score-a.score);
  ranked.forEach((x,i)=>x.rank=i+1);
  return arr;
}
function scoreColor(s){if(s===null||s===undefined)return'var(--dim)';if(s>=70)return'var(--good)';if(s>=45)return'var(--mid)';return'var(--bad)'}
function fmt(v,dec){return v===null||v===undefined?'—':Number(v).toLocaleString('pt-BR',{maximumFractionDigits:dec})}

/* ---------------- navegação telas ---------------- */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');window.scrollTo(0,0)}
function goList(){current=-1;renderList();show('s-list')}
function openFicha(i){current=i;renderFicha();show('s-ficha')}
function navMachine(dir){const ni=current+dir;if(ni>=0&&ni<data.length){current=ni;renderFicha()}}

/* ---------------- lista ---------------- */
function addMachine(){data.push({nome:'',iepson:'SIM',generica:'SIM'});save();openFicha(data.length-1)}
function resetAll(){if(confirm('Apagar TODAS as máquinas coletadas?')){data=[];current=-1;save();renderList()}}
function renderList(){
  const arr=computeScores();
  const cont=document.getElementById('list');
  document.getElementById('emptylist').style.display=data.length?'none':'block';
  // ordenar por score desc, mas manter índice original pra abrir a ficha certa
  const order=arr.map((x,i)=>({...x,idx:i}))
    .sort((a,b)=>{
      if(a.score===null&&b.score===null)return 0;
      if(a.score===null)return 1;if(b.score===null)return -1;
      return b.score-a.score;});
  cont.innerHTML=order.map(x=>{
    const d=x.d,c=x.c;
    const nome=d.nome||'(sem nome)';
    const sub=[d.marca,d.cabeca].filter(Boolean).join(' · ')||'toque para preencher';
    const rankcls=x.rank?('rankbig r'+(x.rank<=3?x.rank:'x')):'rankbig';
    const rankval=x.rank||'–';
    const pb=c.pb?fmt(c.pb,0)+'m':'';
    return `<div class="listitem ${x.rank===1?'top':''}" onclick="openFicha(${x.idx})">
      <div class="${rankcls.replace(' rx','')}">${rankval}</div>
      <div class="liname">
        <div class="n">${nome}</div>
        <div class="sub">${sub}${pb?' · payback '+pb:''}</div>
      </div>
      <div class="liscore"><div class="s" style="color:${scoreColor(x.score)}">${x.score===null?'–':x.score}</div><div class="l">score</div></div>
      <div class="chev">›</div>
    </div>`;
  }).join('');
}

/* ---------------- ficha ---------------- */
function upd(k,v){data[current][k]=v;save();updateLive()}
function seg(k){const d=data[current];
  return `<div class="seg">
    <button class="${d[k]==='SIM'?'sel':''}" onclick="upd('${k}','SIM');renderFicha()">SIM</button>
    <button class="${d[k]==='NÃO'?'selno':''}" onclick="upd('${k}','NÃO');renderFicha()">NÃO</button>
  </div>`;}
function renderFicha(){
  const d=data[current];
  document.getElementById('fh-title').textContent=(d.nome||'Nova máquina');
  document.getElementById('nav-prev').disabled=current<=0;
  document.getElementById('nav-next').disabled=current>=data.length-1;
  const f=document.getElementById('ficha');
  f.innerHTML=`
    <div class="bignamebox">
      <div class="lbl">Empresa / Stand</div>
      <input value="${(d.nome||'').replace(/"/g,'&quot;')}" placeholder="Nome da empresa" oninput="upd('nome',this.value);document.getElementById('fh-title').textContent=this.value||'Nova máquina'">
    </div>

    <div class="scorebanner">
      <div class="big" id="live-score" style="color:${scoreColor(null)}">–</div>
      <div class="lbl">score (preencha para calcular)</div>
    </div>
    <div class="live">
      <div class="livecard"><div class="v" id="live-ct">—</div><div class="l">Custo tinta/m²</div></div>
      <div class="livecard"><div class="v" id="live-lu">—</div><div class="l">Lucro/mês</div></div>
      <div class="livecard"><div class="v" id="live-pb">—</div><div class="l">Payback</div></div>
    </div>

    <div class="sec">Identificação</div>
    <div class="field"><label>Marca</label>
      <input value="${(d.marca||'').replace(/"/g,'&quot;')}" placeholder="ex: AKAD, GCB, Microjet" oninput="upd('marca',this.value)"></div>
    <div class="field"><label>Modelo</label>
      <input value="${(d.modelo||'').replace(/"/g,'&quot;')}" placeholder="ex: NovaJet Turbo X32" oninput="upd('modelo',this.value)"></div>

    <div class="sec">Cabeça de impressão</div>
    <div class="field"><label>Modelo da cabeça</label>
      <input value="${(d.cabeca||'').replace(/"/g,'&quot;')}" placeholder="ex: i3200, i1600" oninput="upd('cabeca',this.value)"></div>
    <div class="field"><label>É Epson i3200 ou i1600? <span class="hint">(outra = reposição cara)</span></label>${seg('iepson')}</div>
    <div class="field"><label>Nº de cabeças</label>
      <input type="number" inputmode="numeric" value="${d.ncab||''}" placeholder="2" oninput="upd('ncab',this.value)"></div>
    <div class="field"><label>Preço de 1 cabeça de reposição <span class="hint">R$</span></label>
      <input type="number" inputmode="decimal" value="${d.precabeca||''}" placeholder="4500" oninput="upd('precabeca',this.value)"></div>

    <div class="sec">Produtividade</div>
    <div class="field"><label>Capacidade <span class="hint">m²/h (4 passes)</span></label>
      <input type="number" inputmode="decimal" value="${d.cap||''}" placeholder="44" oninput="upd('cap',this.value)"></div>

    <div class="sec">Custo de impressão (o que mais importa)</div>
    <div class="field"><label>Preço da tinta <span class="hint">R$/litro</span></label>
      <input type="number" inputmode="decimal" value="${d.tinta||''}" placeholder="180" oninput="upd('tinta',this.value)"></div>
    <div class="field"><label>Rendimento <span class="hint">m²/litro</span></label>
      <input type="number" inputmode="decimal" value="${d.rend||''}" placeholder="120" oninput="upd('rend',this.value)"></div>
    <div class="field"><label>Aceita tinta genérica sem perder garantia?</label>${seg('generica')}</div>

    <div class="sec">Máquina e suporte</div>
    <div class="field"><label>Preço TOTAL da máquina <span class="hint">R$ (com frete + instalação)</span></label>
      <input type="number" inputmode="decimal" value="${d.preco||''}" placeholder="89900" oninput="upd('preco',this.value)"></div>
    <div class="field"><label>Suporte <span class="hint">nota de 1 a 5</span></label>
      <input type="number" inputmode="numeric" min="1" max="5" value="${d.suporte||''}" placeholder="4" oninput="upd('suporte',this.value)"></div>

    <div class="sec">Anotações</div>
    <div class="field"><label>Pontos fortes</label>
      <textarea placeholder="o que te agradou…" oninput="upd('fortes',this.value)">${d.fortes||''}</textarea></div>
    <div class="field"><label>Pontos fracos</label>
      <textarea placeholder="o que te preocupou…" oninput="upd('fracos',this.value)">${d.fracos||''}</textarea></div>

    <div class="delrow"><button onclick="delMachine()">Excluir esta máquina</button></div>
  `;
  updateLive();
}
function updateLive(){
  const d=data[current],c=calc(d);
  const arr=computeScores();
  const me=arr[current];
  const g=(id)=>document.getElementById(id);
  if(g('live-ct'))g('live-ct').textContent=c.ct>0?'R$'+fmt(c.ct,2):'—';
  if(g('live-lu'))g('live-lu').textContent=c.lucro!==null?'R$'+fmt(c.lucro,0):'—';
  if(g('live-pb')){g('live-pb').textContent=c.pb?fmt(c.pb,1)+'m':'—';
    g('live-pb').style.color=c.pb?(c.pb<=10?'var(--good)':c.pb<=18?'var(--mid)':'var(--bad)'):'var(--ink)'}
  if(g('live-score')){const s=me?me.score:null;g('live-score').textContent=s===null||s===undefined?'–':s;
    g('live-score').style.color=scoreColor(s===undefined?null:s)}
}
function delMachine(){if(confirm('Excluir esta máquina?')){data.splice(current,1);save();goList()}}

const rotdlg=document.getElementById('rotdlg');
function rkey(st,n){return 'done2_'+st+'_'+n.replace(/\s/g,'')}
function renderRoteiro(){
  let html='';
  ROTEIRO.forEach(grp=>{
    const total=grp.items.length;
    const done=grp.items.filter(it=>localStorage.getItem(rkey(it.st,it.n))==='1').length;
    html+=`<div class="rgroup" style="padding:0 12px"><div class="rgtitle">${grp.g}<span class="cnt">${done}/${total}</span></div>`;
    grp.items.forEach(it=>{
      const isdone=localStorage.getItem(rkey(it.st,it.n))==='1';
      const tbd=it.st==='TBD';
      html+=`<div class="ritem ${isdone?'done':''}" onclick="toggleR('${it.st}','${it.n.replace(/'/g,"\\'")}')">
        <div class="rcheck">${isdone?'✓':''}</div>
        <div style="flex:1">
          <div class="rtop"><span class="rstand ${tbd?'tbd':''}">${tbd?'no app':it.st}</span>
            <span class="rname">${it.n}</span>${it.prio?'<span class="rprio">não pode faltar</span>':''}</div>
          <div class="rwhy">${it.why}</div>
        </div></div>`;
    });
    html+='</div>';
  });
  document.getElementById('rotbody').innerHTML=html;
}
function toggleR(st,n){const k=rkey(st,n);
  localStorage.setItem(k,localStorage.getItem(k)==='1'?'0':'1');renderRoteiro()}
function openRoteiro(){renderRoteiro();rotdlg.showModal()}
