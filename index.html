<html lang="pt-BR">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Comparador de Plotters — FuturePrint</title>
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel2:#1C232D; --line:#2A323D;
    --ink:#E8EDF2; --dim:#8B97A6; --blue:#3B82F6; --gold:#F5B40C;
    --good:#22C55E; --mid:#EAB308; --bad:#EF4444;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:15px;line-height:1.4;padding-bottom:120px}
  header{position:sticky;top:0;z-index:30;background:#0E1116ee;
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 16px}
  h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--dim);font-size:12px;margin-top:3px}
  .assump{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .assump label{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:7px 10px;font-size:11px;color:var(--dim)}
  .assump input{width:100%;background:transparent;border:none;color:var(--gold);
    font-size:16px;font-weight:700;outline:none;margin-top:2px}
  .wrap{padding:14px 12px}
  .addbar{display:flex;gap:8px;margin-bottom:14px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:11px;font-weight:600}
  .add{flex:1;background:var(--gold);color:#1a1407;padding:14px;font-size:15px}
  .ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);padding:14px 16px;font-size:13px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    margin-bottom:14px;overflow:hidden}
  .card.top{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .chead{display:flex;align-items:center;gap:10px;padding:12px 14px;
    background:var(--panel2);border-bottom:1px solid var(--line)}
  .rankbadge{min-width:34px;height:34px;border-radius:9px;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:16px;background:#2A323D;color:var(--dim)}
  .rankbadge.r1{background:var(--gold);color:#1a1407}
  .rankbadge.r2{background:#9CA3AF;color:#11151b}
  .rankbadge.r3{background:#B45309;color:#fff}
  .cname{flex:1;min-width:0}
  .cname input{width:100%;background:transparent;border:none;color:var(--ink);
    font-size:16px;font-weight:700;outline:none}
  .cname input::placeholder{color:var(--dim)}
  .scorepill{text-align:right}
  .scorenum{font-size:24px;font-weight:800;line-height:1}
  .scorelbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .del{background:none;color:var(--dim);font-size:20px;padding:4px 8px;border:none}

  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line)}
  .metric{background:var(--panel);padding:10px 8px;text-align:center}
  .metric .v{font-size:17px;font-weight:800}
  .metric .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

  .fields{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .f{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 9px}
  .f.full{grid-column:1/3}
  .f .lab{font-size:10px;color:var(--dim);display:block;margin-bottom:1px}
  .f input,.f select{width:100%;background:transparent;border:none;color:var(--blue);
    font-size:15px;font-weight:600;outline:none;font-family:inherit}
  .f select{color:var(--ink)}
  .f input::placeholder{color:#4a5563}
  option{background:var(--panel2);color:var(--ink)}

  .prosbox{padding:0 12px 12px}
  .prosbox textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);padding:8px 10px;font-family:inherit;font-size:13px;
    resize:vertical;min-height:42px;outline:none}
  .prosbox .lab{font-size:10px;color:var(--dim);margin:6px 2px 3px}

  .flag{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:600;margin-left:6px}
  .flag.ok{background:#14331f;color:var(--good)}
  .flag.warn{background:#3a2410;color:var(--gold)}

  .empty{text-align:center;color:var(--dim);padding:40px 20px;font-size:14px}
  .foot{position:fixed;bottom:0;left:0;right:0;background:#0E1116f2;border-top:1px solid var(--line);
    padding:10px 12px;display:flex;gap:8px;backdrop-filter:blur(8px)}
  .foot button{flex:1;padding:12px;font-size:13px}
  .reset{background:#2a1518;color:#fca5a5;border:1px solid #4a2226}
  .ref{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  /* tabs */
  .tabs{display:flex;gap:6px;margin-top:12px}
  .tab{flex:1;text-align:center;padding:9px;border-radius:10px;background:var(--panel2);
    border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:700}
  .tab.on{background:var(--gold);color:#1a1407;border-color:var(--gold)}
  .view{display:none}
  .view.on{display:block}
  /* roteiro */
  .rgroup{margin-bottom:18px}
  .rgtitle{font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;
    letter-spacing:.5px;margin:0 2px 8px;display:flex;align-items:center;gap:8px}
  .rgtitle .cnt{font-size:11px;color:var(--dim);font-weight:600}
  .ritem{display:flex;gap:11px;align-items:flex-start;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px}
  .ritem.done{opacity:.5}
  .ritem.done .rname{text-decoration:line-through}
  .rcheck{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#1a1407;background:transparent}
  .ritem.done .rcheck{background:var(--good);border-color:var(--good)}
  .rbody{flex:1;min-width:0}
  .rtop{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .rstand{font-family:monospace;font-size:12px;font-weight:700;color:#1a1407;
    background:var(--gold);padding:1px 7px;border-radius:5px}
  .rstand.tbd{background:var(--panel2);color:var(--dim)}
  .rname{font-size:15px;font-weight:700}
  .rwhy{font-size:12px;color:var(--dim);margin-top:3px;line-height:1.35}
  .rprio{font-size:10px;font-weight:800;text-transform:uppercase;padding:1px 6px;
    border-radius:5px;background:#3a1518;color:#fca5a5}
  .rnote{font-size:11px;color:var(--dim);font-style:italic;padding:2px 4px 10px}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:16px;padding:0;max-width:92vw;width:440px}
  dialog::backdrop{background:#000a}
  .dlghead{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between}
  .dlgbody{padding:8px 0;max-height:70vh;overflow:auto}
  .refrow{padding:10px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .refrow b{color:var(--gold)}
  .refrow.dead b{color:var(--bad);text-decoration:line-through}
  .refrow .meta{color:var(--dim);font-size:11px;margin-top:2px}
</style>

<header>

  <div class="sub">FuturePrint • preencha 1 card por stand • ranqueia sozinho</div>

    <label>Volume m²/mês<input id="volume" type="number" inputmode="decimal" value="400"></label>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-comp" onclick="showView('comp')">Comparador</div>
    <div class="tab" id="tab-rot" onclick="showView('rot')">Roteiro da feira</div>
  </div>
</header>

<div class="wrap">

    <div class="addbar">

    </div>

    <div id="empty" class="empty">Toque em <b>+ Novo stand</b> para começar a coletar.</div>
  </div>

    <div id="roteiro"></div>
  </div>
</div>

<div class="foot">
  <button class="ref" onclick="openRef()">Ver benchmarks</button>
  <button class="reset" onclick="resetAll()">Zerar tudo</button>
</div>

<dialog id="refdlg">
  <div class="dlghead"><span>Benchmarks levantados</span><button class="del" onclick="refdlg.close()">✕</button></div>

function rkey(st,n){return 'done_'+st+'_'+n.replace(/\s/g,'')}
function renderRoteiro(){
  const cont=document.getElementById('roteiro');
  let html='<div class="rnote">Lista montada da parte pública do app (até "H") + players do setor. Itens "buscar no app" confirme ao logar. Toque para riscar.</div>';
  ROTEIRO.forEach((grp,gi)=>{
    const total=grp.items.length;
    let done=grp.items.filter(it=>localStorage.getItem(rkey(it.st,it.n))==='1').length;
    html+=`<div class="rgroup"><div class="rgtitle">${grp.g}<span class="cnt">${done}/${total}</span></div>`;
    grp.items.forEach(it=>{
      const isdone=localStorage.getItem(rkey(it.st,it.n))==='1';
      const tbd=it.st==='TBD';
      html+=`<div class="ritem ${isdone?'done':''}" onclick="toggleR('${it.st}','${it.n.replace(/'/g,"\\'")}')">
        <div class="rcheck">${isdone?'✓':''}</div>
        <div class="rbody">
          <div class="rtop">
            <span class="rstand ${tbd?'tbd':''}">${tbd?'no app':it.st}</span>
            <span class="rname">${it.n}</span>
            ${it.prio===1?'<span class="rprio">não pode faltar</span>':''}
          </div>
          <div class="rwhy">${it.why}</div>
        </div></div>`;
    });
    html+='</div>';
  });
  cont.innerHTML=html;
}
function toggleR(st,n){
  const k=rkey(st,n);
  localStorage.setItem(k, localStorage.getItem(k)==='1'?'0':'1');
  renderRoteiro();
}
function showView(v){
  document.getElementById('view-comp').classList.toggle('on',v==='comp');
  document.getElementById('view-rot').classList.toggle('on',v==='rot');
  document.getElementById('tab-comp').classList.toggle('on',v==='comp');
  document.getElementById('tab-rot').classList.toggle('on',v==='rot');
  if(v==='rot')renderRoteiro();
}

const F=['nome','marca','cabeca','iepson','ncab','cap','precabeca','tinta','rend','generica','preco','suporte','fortes','fracos'];
let data=load();

function load(){try{return JSON.parse(localStorage.getItem('plotters')||'[]')}catch(e){return[]}}
function save(){localStorage.setItem('plotters',JSON.stringify(data));
  localStorage.setItem('assump',JSON.stringify({m:margem.value,v:volume.value}))}
(function(){try{const a=JSON.parse(localStorage.getItem('assump'));if(a){margem.value=a.m;volume.value=a.v}}catch(e){}})();

function addCard(){data.push({nome:'',iepson:'SIM',generica:'SIM'});save();render()}
function delCard(i){if(confirm('Remover este stand?')){data.splice(i,1);save();render()}}
function resetAll(){if(confirm('Apagar TODOS os stands coletados?')){data=[];save();render()}}
function upd(i,k,v){data[i][k]=v;save();renderScores()}

const margem=document.getElementById('margem'),volume=document.getElementById('volume');
margem.oninput=()=>{save();renderScores()};volume.oninput=()=>{save();renderScores()};

function num(x){const n=parseFloat(x);return isNaN(n)?0:n}
function calc(d){
  const M=num(margem.value),V=num(volume.value);
  const ct=num(d.rend)>0?num(d.tinta)/num(d.rend):0;
  const ml=ct>0?M-ct:null;
  const lucro=ml!==null?ml*V:null;
  const pb=(lucro&&lucro>0&&num(d.preco)>0)?num(d.preco)/lucro:null;
  return {ct,ml,lucro,pb};
}
function scores(){
  const arr=data.map(d=>({d,c:calc(d)}));
  const precos=arr.map(x=>num(x.d.preco)).filter(v=>v>0);
  const custos=arr.map(x=>x.c.ct).filter(v=>v>0);
  const pbs=arr.map(x=>x.c.pb).filter(v=>v);
  const inv=(v,list)=>{if(v<=0||list.length<2)return 50;const mn=Math.min(...list),mx=Math.max(...list);
    return mx===mn?100:100*(mx-v)/(mx-mn)};
  arr.forEach(x=>{
    if(num(x.d.preco)<=0){x.score=null;return}
    const sP=inv(num(x.d.preco),precos);
    const sC=x.c.ct>0?inv(x.c.ct,custos):50;
    const sB=x.c.pb?inv(x.c.pb,pbs):50;
    const conf=((num(x.d.suporte)/5)*0.6+((x.d.iepson||'').toUpperCase()==='SIM'?0.4:0))*100;
    x.score=Math.round(0.40*sP+0.25*sC+0.20*sB+0.15*conf);
  });
  const ranked=[...arr].filter(x=>x.score!==null).sort((a,b)=>b.score-a.score);
  ranked.forEach((x,i)=>x.rank=i+1);
  return arr;
}
function fmt(v,suf='',dec=2){return v===null||v===undefined?'—':(typeof v==='number'?v.toLocaleString('pt-BR',{maximumFractionDigits:dec}):v)+suf}
function scoreColor(s){if(s===null)return'var(--dim)';if(s>=70)return'var(--good)';if(s>=45)return'var(--mid)';return'var(--bad)'}

function fieldHTML(i,d){
  const yn=(k)=>`<select onchange="upd(${i},'${k}',this.value)">
    <option ${d[k]==='SIM'?'selected':''}>SIM</option>
    <option ${d[k]==='NÃO'?'selected':''}>NÃO</option></select>`;
  return `<div class="fields">
    <div class="f"><span class="lab">Marca</span><input value="${d.marca||''}" placeholder="ex: AKAD" oninput="upd(${i},'marca',this.value)"></div>
    <div class="f"><span class="lab">Cabeça (modelo)</span><input value="${d.cabeca||''}" placeholder="i3200 / i1600" oninput="upd(${i},'cabeca',this.value)"></div>
    <div class="f"><span class="lab">É Epson i3200/i1600?</span>${yn('iepson')}</div>
    <div class="f"><span class="lab">Nº de cabeças</span><input type="number" inputmode="numeric" value="${d.ncab||''}" placeholder="2" oninput="upd(${i},'ncab',this.value)"></div>
    <div class="f"><span class="lab">Capacidade m²/h</span><input type="number" inputmode="decimal" value="${d.cap||''}" placeholder="44" oninput="upd(${i},'cap',this.value)"></div>
    <div class="f"><span class="lab">Preço cabeça repos. R$</span><input type="number" inputmode="decimal" value="${d.precabeca||''}" placeholder="4500" oninput="upd(${i},'precabeca',this.value)"></div>
    <div class="f"><span class="lab">Tinta R$/litro</span><input type="number" inputmode="decimal" value="${d.tinta||''}" placeholder="180" oninput="upd(${i},'tinta',this.value)"></div>
    <div class="f"><span class="lab">Rendimento m²/litro</span><input type="number" inputmode="decimal" value="${d.rend||''}" placeholder="120" oninput="upd(${i},'rend',this.value)"></div>
    <div class="f"><span class="lab">Aceita tinta genérica?</span>${yn('generica')}</div>
    <div class="f"><span class="lab">Suporte (1-5)</span><input type="number" inputmode="numeric" min="1" max="5" value="${d.suporte||''}" placeholder="4" oninput="upd(${i},'suporte',this.value)"></div>
    <div class="f full"><span class="lab">Preço máquina TOTAL R$ (c/ frete+instalação)</span><input type="number" inputmode="decimal" value="${d.preco||''}" placeholder="89900" oninput="upd(${i},'preco',this.value)"></div>
  </div>`;
}

function render(){
  const cont=document.getElementById('cards');
  document.getElementById('empty').style.display=data.length?'none':'block';
  cont.innerHTML=data.map((d,i)=>`
    <div class="card" id="card${i}">
      <div class="chead">
        <div class="rankbadge" id="rk${i}">–</div>
        <div class="cname"><input value="${d.nome||''}" placeholder="Nome do stand / marca" oninput="upd(${i},'nome',this.value);document.getElementById('rk'+${i})"></div>
        <div class="scorepill"><div class="scorenum" id="sc${i}">–</div><div class="scorelbl">score</div></div>
        <button class="del" onclick="delCard(${i})">✕</button>
      </div>
      <div class="metrics">
        <div class="metric"><div class="v" id="ct${i}">—</div><div class="l">Custo tinta/m²</div></div>
        <div class="metric"><div class="v" id="lu${i}">—</div><div class="l">Lucro/mês</div></div>
        <div class="metric"><div class="v" id="pb${i}">—</div><div class="l">Payback</div></div>
      </div>
      ${fieldHTML(i,d)}
      <div class="prosbox">
        <div class="lab">Pontos fortes</div>
        <textarea placeholder="o que te agradou…" oninput="upd(${i},'fortes',this.value)">${d.fortes||''}</textarea>
        <div class="lab">Pontos fracos</div>
        <textarea placeholder="o que te preocupou…" oninput="upd(${i},'fracos',this.value)">${d.fracos||''}</textarea>
      </div>
    </div>`).join('');
  renderScores();
}
function renderScores(){
  const arr=scores();
  arr.forEach((x,i)=>{
    const c=x.c;
    const g=(id)=>document.getElementById(id+i);
    if(g('ct'))g('ct').textContent=c.ct>0?'R$ '+fmt(c.ct,'',2):'—';
    if(g('lu'))g('lu').textContent=c.lucro!==null?'R$ '+fmt(c.lucro,'',0):'—';
    if(g('pb')){g('pb').textContent=c.pb?fmt(c.pb,' m',1):'—';
      g('pb').style.color=c.pb?(c.pb<=10?'var(--good)':c.pb<=18?'var(--mid)':'var(--bad)'):'var(--ink)'}
    const sc=g('sc');
    if(sc){sc.textContent=x.score===null?'–':x.score;sc.style.color=scoreColor(x.score)}
    const rk=g('rk'),card=document.getElementById('card'+i);
    if(rk){
      if(x.rank){rk.textContent=x.rank;rk.className='rankbadge'+(x.rank<=3?' r'+x.rank:'')}
      else{rk.textContent='–';rk.className='rankbadge'}
      card.classList.toggle('top',x.rank===1);
    }
  });
}
render();
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
